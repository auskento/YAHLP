<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3aa0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecd6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" opacity="0.15"/>
  <!-- Left arrow (request) -->
  <path d="M 25 45 L 35 50 L 25 55 L 30 50 Z" fill="#3aa0e0" opacity="0.8"/>
  <!-- Center box (proxy) -->
  <rect x="40" y="40" width="20" height="20" rx="2" fill="url(#grad)"/>
  <!-- Right arrow (response) -->
  <path d="M 75 45 L 65 50 L 75 55 L 70 50 Z" fill="#2ecd6f" opacity="0.8"/>
  <!-- Small decorative elements -->
  <circle cx="50" cy="30" r="3" fill="#3aa0e0" opacity="0.6"/>
