<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Vibrant background gradient with more depth -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <!-- Tablet gradient - pristine white to light blue -->
    <linearGradient id="tabletGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>

    <!-- Pen gradient - vibrant orange to gold -->
    <linearGradient id="penGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Data flow gradient - rainbow effect -->
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9" />
      <stop offset="33%" style="stop-color:#3b82f6;stop-opacity:0.9" />
      <stop offset="66%" style="stop-color:#8b5cf6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.9" />
    </linearGradient>

    <!-- Skin tone gradient for hand -->
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b998;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <radialGradient id="glowGradient">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>

    <!-- Shadow for depth -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#glowGradient)" stroke-width="4" opacity="0.3"/>

  <!-- Circular background with vibrant gradient -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />

  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>

  <!-- Decorative data particles with enhanced visuals -->
  <g filter="url(#glow)">
    <circle cx="35" cy="55" r="4" fill="#10b981" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="165" cy="65" r="3.5" fill="#f59e0b" opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3.5;4.5;3.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="135" r="3" fill="#ec4899" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="145" r="4.5" fill="#14b8a6" opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4.5;5.5;4.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Additional floating particles for artistic effect -->
  <circle cx="50" cy="100" r="2" fill="#a78bfa" opacity="0.5">
    <animate attributeName="cy" values="100;95;100" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="110" r="2.5" fill="#fbbf24" opacity="0.5">
    <animate attributeName="cy" values="110;105;110" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Hand holding the tablet from bottom left -->
  <g filter="url(#shadow)">
    <!-- Wrist/forearm -->
    <path d="M 40 155 Q 42 165, 48 165 L 58 165 Q 62 165, 62 160 L 62 155 Q 62 150, 58 150 L 48 150 Q 42 150, 40 155 Z"
          fill="url(#skinGradient)" stroke="#d4a574" stroke-width="1"/>

    <!-- Palm -->
    <ellipse cx="60" cy="145" rx="12" ry="18" fill="url(#skinGradient)" stroke="#d4a574" stroke-width="1" transform="rotate(-10 60 145)"/>

    <!-- Thumb (holding left edge of tablet) -->
    <ellipse cx="53" cy="80" rx="5" ry="12" fill="url(#skinGradient)" stroke="#d4a574" stroke-width="1" transform="rotate(15 53 80)"/>
    <ellipse cx="53" cy="72" rx="4.5" ry="6" fill="#f8d7b5" stroke="#d4a574" stroke-width="0.8" transform="rotate(15 53 72)"/>

    <!-- Index finger (supporting bottom of tablet) -->
    <ellipse cx="70" cy="158" rx="4" ry="10" fill="url(#skinGradient)" stroke="#d4a574" stroke-width="0.8" transform="rotate(-5 70 158)"/>

    <!-- Middle finger -->
    <ellipse cx="82" cy="160" rx="4" ry="11" fill="url(#skinGradient)" stroke="#d4a574" stroke-width="0.8" transform="rotate(-3 82 160)"/>

    <!-- Ring finger -->
    <ellipse cx="94" cy="161" rx="3.8" ry="10" fill="url(#skinGradient)" stroke="#d4a574" stroke-width="0.8" transform="rotate(-2 94 161)"/>

    <!-- Pinky finger -->
    <ellipse cx="104" cy="162" rx="3.5" ry="8" fill="url(#skinGradient)" stroke="#d4a574" stroke-width="0.8" transform="rotate(0 104 162)"/>

    <!-- Finger highlights for depth -->
    <ellipse cx="53" cy="75" rx="2" ry="4" fill="#ffffff" opacity="0.3" transform="rotate(15 53 75)"/>
    <ellipse cx="70" cy="155" rx="1.5" ry="3" fill="#ffffff" opacity="0.3" transform="rotate(-5 70 155)"/>
  </g>

  <!-- Tablet/Slate with enhanced shadow -->
  <g filter="url(#shadow)">
    <rect x="52" y="40" width="96" height="120" rx="8" ry="8" fill="url(#tabletGradient)" stroke="#3b82f6" stroke-width="3"/>
    <!-- Inner border for depth -->
    <rect x="56" y="44" width="88" height="112" rx="6" ry="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Colorful lines with more artistic styling -->
  <g>
    <line x1="67" y1="62" x2="133" y2="62" stroke="url(#dataGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="67" y1="78" x2="133" y2="78" stroke="url(#dataGradient)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="67" y1="94" x2="133" y2="94" stroke="url(#dataGradient)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="67" y1="110" x2="115" y2="110" stroke="url(#dataGradient)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="67" y1="126" x2="105" y2="126" stroke="url(#dataGradient)" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- NZB Document icon with more detail -->
  <g transform="translate(108, 128)" filter="url(#shadow)">
    <rect x="0" y="0" width="22" height="26" rx="2.5" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="22,0 22,8 14,8" fill="#3b82f6" opacity="0.3"/>
    <line x1="5" y1="12" x2="17" y2="12" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="16" x2="17" y2="16" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="13" y2="20" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
    <!-- "N Z B" text representation -->
    <text x="11" y="10" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="#3b82f6" text-anchor="middle" opacity="0.6">NZB</text>
  </g>

  <!-- Stylish pen with enhanced details -->
  <g transform="translate(130, 138) rotate(-38)" filter="url(#shadow)">
    <rect x="0" y="0" width="8" height="45" rx="4" fill="url(#penGradient)"/>
    <!-- Pen bands for detail -->
    <rect x="0" y="10" width="8" height="3" fill="#d97706" opacity="0.5"/>
    <rect x="0" y="16" width="8" height="2" fill="#b45309" opacity="0.6"/>
    <circle cx="4" cy="45" r="3" fill="#b45309"/>
    <!-- Pen tip -->
    <polygon points="4,45 1.5,50 6.5,50" fill="#1f2937"/>
    <polygon points="4,50 3,52 5,52" fill="#374151"/>
    <!-- Pen highlight -->
    <ellipse cx="2.5" cy="12" rx="2" ry="6" fill="#fef3c7" opacity="0.5"/>
  </g>

  <!-- Enhanced sparkle effects -->
  <g filter="url(#glow)">
    <path d="M 70 50 L 72.5 54 L 76 52 L 73.5 56 L 77 59 L 73 59 L 72 63 L 71 59 L 67 59 L 70.5 56 Z" fill="#fbbf24">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 72 56; 360 72 56" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 140 70 L 142 73 L 145 71.5 L 143 75 L 146 77.5 L 142.5 77.5 L 141.5 81 L 140.5 77.5 L 137 77.5 L 140 75 Z" fill="#a78bfa">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 141 75; -360 141 75" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 125 50 L 126.5 52 L 129 51 L 127 53.5 L 129.5 55.5 L 127 55.5 L 126.5 58 L 126 55.5 L 123.5 55.5 L 126 53.5 Z" fill="#ec4899" transform="scale(0.7)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Shine effect on tablet - more pronounced -->
  <ellipse cx="100" cy="55" rx="40" ry="18" fill="white" opacity="0.3"/>
  <ellipse cx="95" cy="50" rx="25" ry="12" fill="white" opacity="0.2"/>

  <!-- "Tabula Rasa" text on the tablet - handwritten style -->
  <text x="100" y="105" font-family="'Brush Script MT', 'Lucida Handwriting', 'Comic Sans MS', cursive" font-size="13" font-weight="normal" font-style="normal" fill="#1f2937" text-anchor="middle" opacity="0.75" letter-spacing="1">
    Tabula Rasa
  </text>
  <!-- Text subtle shadow for depth -->
  <text x="101" y="106" font-family="'Brush Script MT', 'Lucida Handwriting', 'Comic Sans MS', cursive" font-size="13" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="middle" opacity="0.25" letter-spacing="1">
    Tabula Rasa
  </text>

  <!-- Subtle corner accents -->
  <path d="M 15 100 Q 15 15, 100 15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <path d="M 185 100 Q 185 185, 100 185" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
</svg>

