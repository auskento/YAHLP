# Basic Authentication Configuration
# Protect HTML files on filesystem and all service paths
# Single AuthName prevents repeated prompts when navigating menus

# Exclude health checks from auth
<Location /health>
    Require all granted
</Location>

# Exclude static files and assets from auth
<Location /favicon.ico>
    Require all granted
</Location>

<Location /icons>
    Require all granted
</Location>

<Location /styles>
    Require all granted
</Location>

<Location ~ "\.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2)$">
    Require all granted
</Location>

# Protect all HTML files on filesystem (single auth for all menu navigation)
<Directory /var/www/html>
    AuthType Basic
    AuthName "YAHLP"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Directory>

# Protect all proxied service paths (folder-based services only)
# Note: seerr, emby, plex are subdomains and handled by separate vhost files
<LocationMatch "^/(sabnzbd|nzbget|nzbhydra|deluge|transmission|qbittorrent|radarr|sonarr|lidarr|whisparr|prowlarr|jackett|bazarr|jellyfin|tautulli|maintainerr)(/|$)">
    AuthType Basic
    AuthName "YAHLP"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</LocationMatch>
