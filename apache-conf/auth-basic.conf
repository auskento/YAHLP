# Basic Authentication Configuration
# Protect all paths including HTML files with consistent auth realm
# Single AuthName "HomELabPortal" ensures browser caches credentials for all requests

<Location />
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Location>

# Health checks don't require auth
<Location /health>
    Require all granted
</Location>

# Icons don't require auth (static assets)
<Location /icons>
    Require all granted
</Location>
