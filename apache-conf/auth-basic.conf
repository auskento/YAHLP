# Basic Authentication Configuration
# Protect service paths and root, allow menu navigation without re-auth
# Single AuthName ensures browser caches credentials across all paths

<Location />
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user

    # Allow unauthenticated access to be overridden below
    AuthType None
</Location>

# Explicitly protect service proxy paths
<LocationMatch "^/(sabnzbd|nzbget|nzbhydra|deluge|transmission|qbittorrent|radarr|sonarr|lidarr|whisparr|prowlarr|seerr|bazarr|jellyfin|tautulli|emby|plex)">
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</LocationMatch>

# Allow menu HTML and static assets without auth
<LocationMatch "^/(classic\.html|modern\.html|sleek\.html|minimal\.html|index\.html|health|icons)">
    AuthType None
    Require all granted
</LocationMatch>
