# Basic Authentication Configuration
# Protect everything by default, then exclude menu files and static assets

# Default: Protect root and all paths
<Location />
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Location>

# Exclude menu HTML files and static assets from auth requirement
<LocationMatch "^/(classic\.html|modern\.html|sleek\.html|minimal\.html|index\.html|health|icons)">
    Require all granted
</LocationMatch>
