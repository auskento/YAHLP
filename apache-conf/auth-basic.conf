# Basic Authentication Configuration
# Protect HTML files and application content with consistent auth realm
# Uses Directory directive for filesystem-level protection of actual files

<Directory /var/www/html>
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Directory>

# Protect all URL paths to catch proxied services and any other requests
<Location />
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Location>

# Health checks don't require auth
<Location /health>
    Require all granted
</Location>

# Icons don't require auth (static assets)
<Location /icons>
    Require all granted
</Location>
