# Security configuration - block access to sensitive files
<FilesMatch "\.env$">
    Require all denied
</FilesMatch>

<FilesMatch "\.git">
    Require all denied
</FilesMatch>

<FilesMatch "^\.">
    Require all denied
</FilesMatch>

# Block access to common sensitive file patterns
<FilesMatch "\.(sql|bak|backup|conf|config|json5|swp|tmp)$">
    Require all denied
</FilesMatch>
