# Google Authentication Protection Locations
# This file is conditionally included when AUTHTYPE=google
# All proxied services will require Google login

# Enable rewrite engine for auth checks
RewriteEngine On

# OAuth handler paths - these don't require auth
<Location /oauth2>
    SetHandler oauth2-handler
</Location>

<Location /oauth2callback>
    SetHandler oauth2-handler
</Location>

# Health, static assets, and error pages - no auth required
<Location /health>
    Require all granted
</Location>

<Location /api>
    Require all granted
</Location>

<Location /icons>
    Require all granted
</Location>

<Location /sites>
    Require all granted
</Location>

<Location /error-pages>
    Require all granted
</Location>

# All other paths require authentication
# Using LocationMatch to protect everything except oauth/health/api/icons/sites/error-pages
<LocationMatch "^/(?!oauth2|health|api|icons|sites|error-pages)">
    AuthType openid-connect
    Require valid-user
</LocationMatch>

# Root path protection
<Location />
    AuthType openid-connect
    Require valid-user
</Location>

# Google User Information Headers
# Pass user info to backend services so they know who's logged in
RequestHeader set X-Remote-User %{OIDC_email}e
RequestHeader set X-Remote-Name %{OIDC_name}e
RequestHeader set X-Remote-ID %{OIDC_sub}e
RequestHeader set X-Auth-Method "Google"

# Optional: Set user info as environment variables for use in error pages
SetEnvIf Request_URI ".*" OIDC_email=%{OIDC_email}e
SetEnvIf Request_URI ".*" OIDC_name=%{OIDC_name}e
