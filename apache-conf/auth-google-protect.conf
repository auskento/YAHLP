# Google Authentication Protection Locations
# This file is conditionally included when AUTHTYPE=google
# All proxied services will require Google login

# Main authentication endpoint for login/logout
<Location /oauth2>
    SetHandler oauth2-handler
</Location>

<Location /oauth2callback>
    SetHandler oauth2-handler
</Location>

# Root protection - redirect to OAuth2
<Location />
    AuthType openid-connect
    Require valid-user
    LogLevel debug
</Location>

# All proxied services inherit authentication from root location
# The following uses path-based protection pattern

# Service protection macro - each service location requires auth
# Pattern: Each Location block inherits from parent /

# Home page
<Location />
    AuthType openid-connect
    Require valid-user
</Location>

# All service paths - inherited authentication
# If a service is proxied at /sonarr, it automatically requires auth

# Unprotected paths (optional - customize as needed)
# <Location /health>
#     Require all granted
# </Location>

# <Location /.well-known>
#     Require all granted
# </Location>

# Google User Information Headers
# Pass user info to backend services so they know who's logged in
RequestHeader set X-Remote-User %{OIDC_email}e
RequestHeader set X-Remote-Name %{OIDC_name}e
RequestHeader set X-Remote-ID %{OIDC_sub}e
RequestHeader set X-Auth-Method "Google"

# Optional: Set user info as environment variables for use in error pages
SetEnvIf Request_URI ".*" OIDC_email=%{OIDC_email}e
SetEnvIf Request_URI ".*" OIDC_name=%{OIDC_name}e
