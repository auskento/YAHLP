ProxyPass /nzbhydra http://nzbhydra:5076/nzbhydra nocanon
ProxyPassReverse /nzbhydra http://nzbhydra:5076/nzbhydra
ProxyPassReverseCookieDomain nzbhydra localhost
ProxyPassReverseCookiePath / /nzbhydra/

<Location /nzbhydra>
    RequestHeader set X-Forwarded-Base "/nzbhydra/"

    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>


