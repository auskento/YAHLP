# Lidarr Reverse Proxy Configuration
ProxyPass /lidarr http://lidarr:8686/lidarr
ProxyPassReverse /lidarr http://lidarr:8686/lidarr
ProxyPass /lidarr/api http://lidarr:8686/lidarr/api
ProxyPassReverse /lidarr/api http://lidarr:8686/lidarr/api
ProxyPass /lidarr/signalr ws://lidarr:8686/lidarr/signalr
ProxyPassReverse /lidarr/signalr ws://lidarr:8686/lidarr/signalr

<Location /lidarr>
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

