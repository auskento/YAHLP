# Whisparr Reverse Proxy Configuration
ProxyPass /whisparr http://whisparr:6969/whisparr
ProxyPassReverse /whisparr http://whisparr:6969/whisparr
ProxyPass /whisparr/api http://whisparr:6969/whisparr/api
ProxyPassReverse /whisparr/api http://whisparr:6969/whisparr/api
ProxyPass /whisparr/login http://whisparr:6969/whisparr/login
ProxyPassReverse /whisparr/login http://whisparr:6969/whisparr/login
ProxyPass /whisparr/signalr ws://whisparr:6969/whisparr/signalr
ProxyPassReverse /whisparr/signalr ws://whisparr:6969/whisparr/signalr

<Location /whisparr>
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

