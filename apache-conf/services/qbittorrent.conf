# qBittorrent Reverse Proxy Configuration
<Location /qbittorrent>
    ProxyPass http://qbittorrent:8080/
    ProxyPassReverse http://qbittorrent:8080/
    
    # qBittorrent-specific settings
    
    # Headers for proper operation
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /qbittorrent/api>
    ProxyPass http://qbittorrent:8080/api
    ProxyPassReverse http://qbittorrent:8080/api
</Location>

# WebSocket support for real-time updates
<Location /qbittorrent/socket.io>
    ProxyPass ws://qbittorrent:8080/socket.io
    ProxyPassReverse ws://qbittorrent:8080/socket.io
</Location>
