# qBittorrent Reverse Proxy Configuration
# Redirect /qbittorrent to /qbittorrent/ to avoid download issues
RewriteRule ^/qbittorrent$ /qbittorrent/ [R=301,L]

ProxyPass /qbittorrent/ http://qbittorrent:8080/
ProxyPassReverse /qbittorrent/ http://qbittorrent:8080/
ProxyPass /qbittorrent/api http://qbittorrent:8080/api
ProxyPassReverse /qbittorrent/api http://qbittorrent:8080/api
ProxyPass /qbittorrent/socket.io ws://qbittorrent:8080/socket.io
ProxyPassReverse /qbittorrent/socket.io ws://qbittorrent:8080/socket.io

<Location /qbittorrent/>
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
    RequestHeader set X-Script-Name "/qbittorrent"

    # Handle Location header redirects
    Header edit location ^/ https://@@DOMAIN@@/qbittorrent/

    # Enable output filtering for content rewriting
    AddOutputFilterByType INFLATE;SUBSTITUTE text/html application/javascript application/json
    SubstituteMaxLineLength 2000K

    # Rewrite relative paths in responses
    Substitute "s|href=\"/|href=\"/qbittorrent/|in"
    Substitute "s|src=\"/|src=\"/qbittorrent/|in"
    Substitute "s|action=\"/|action=\"/qbittorrent/|in"
    Substitute "s|/api/|/qbittorrent/api/|in"
</Location>

