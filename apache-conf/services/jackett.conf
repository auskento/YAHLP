# Jackett Reverse Proxy Configuration
ProxyPass /jackett http://jackett:9117/jackett
ProxyPassReverse /jackett http://jackett:9117/jackett
ProxyPass /jackett/api http://jackett:9117/jackett/api
ProxyPassReverse /jackett/api http://jackett:9117/jackett/api

<Location /jackett>
    AuthType openid-connect
    Require valid-user
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e

    # Rewrite HTTP URLs to HTTPS in responses to fix mixed content
    AddOutputFilterByType SUBSTITUTE text/html text/plain
    Substitute "s|http://transfers.limosani.net.au/|https://transfers.limosani.net.au/|i"
</Location>

<Location /jackett/api>
    AuthType openid-connect
    Require valid-user
</Location>

