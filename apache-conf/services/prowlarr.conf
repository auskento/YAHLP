# Prowlarr Reverse Proxy Configuration
<Location /prowlarr>
    AuthType openid-connect
    Require valid-user
    ProxyPass http://prowlarr:9696/prowlarr
    ProxyPassReverse http://prowlarr:9696/prowlarr
    
    # Prowlarr-specific settings
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /prowlarr/api>
    AuthType openid-connect
    Require valid-user
    ProxyPass http://prowlarr:9696/prowlarr/api
    ProxyPassReverse http://prowlarr:9696/prowlarr/api
</Location>

# WebSocket support for real-time updates
<Location /prowlarr/signalr>
    AuthType openid-connect
    Require valid-user
    ProxyPass ws://prowlarr:9696/prowlarr/signalr
    ProxyPassReverse ws://prowlarr:9696/prowlarr/signalr
</Location>

