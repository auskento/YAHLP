# Prowlarr Reverse Proxy Configuration
ProxyPass /prowlarr http://prowlarr:9696/prowlarr
ProxyPassReverse /prowlarr http://prowlarr:9696/prowlarr
ProxyPass /prowlarr/api http://prowlarr:9696/prowlarr/api
ProxyPassReverse /prowlarr/api http://prowlarr:9696/prowlarr/api
ProxyPass /prowlarr/signalr ws://prowlarr:9696/prowlarr/signalr
ProxyPassReverse /prowlarr/signalr ws://prowlarr:9696/prowlarr/signalr

<Location /prowlarr>
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

