<Location /nzbget>
    # NZBGet authentication headers (generated by generate-config.sh if NZBGET_USER is set)
    @@NZBGET_AUTH_HEADER@@

    # NZBGet reverse proxy configuration
    ProxyPass http://nzbget:6789/ nocanon
    ProxyPassReverse http://nzbget:6789/
    ProxyPreserveHost On

    # Request headers for proper proxying
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set X-Forwarded-Port "443"

    # Handle cookies properly
    ProxyPassReverseCookiePath / /nzbget
    ProxyPassReverseCookieDomain ~^(.*)$ "nzbget"

    # Rewrite HTML responses to fix relative paths
    AddOutputFilter SUBSTITUTE text/html
    Substitute "s|href=\"/|href=\"/nzbget/|i"
    Substitute "s|src=\"/|src=\"/nzbget/|i"
    Substitute "s|action=\"/|action=\"/nzbget/|i"
</Location>

# Handle combined JS/CSS files with explicit MIME types
<LocationMatch "^/nzbget/combined\.(js|css)">
    ProxyPass http://nzbget:6789/combined.$1 nocanon
    ProxyPassReverse http://nzbget:6789/combined.$1

    # Set correct MIME type based on extension
    <If "%{REQUEST_URI} =~ /combined\.js/">
        Header always set Content-Type "application/javascript"
    </If>
    <If "%{REQUEST_URI} =~ /combined\.css/">
        Header always set Content-Type "text/css"
    </If>
</LocationMatch>
