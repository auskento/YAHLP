# NZBGet reverse proxy configuration
ProxyPass /nzbget @@NZBGET_URL@@
ProxyPassReverse /nzbget @@NZBGET_URL@@

<Location /nzbget>
    ProxyPreserveHost On

    # NZBGet headers - tell app it's being served under /nzbget/
    RequestHeader set X-Script-Name "/nzbget"
    RequestHeader set X-Script-Root "/nzbget"
    RequestHeader set X-Forwarded-Base "/nzbget/"

    # Standard headers
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
</Location>


