# Sonarr Reverse Proxy Configuration
# ProxyPass directives at VirtualHost level (translation phase)
ProxyPass /sonarr http://sonarr:8989/sonarr
ProxyPassReverse /sonarr http://sonarr:8989/sonarr
ProxyPass /sonarr/api http://sonarr:8989/sonarr/api
ProxyPassReverse /sonarr/api http://sonarr:8989/sonarr/api
ProxyPass /sonarr/login http://sonarr:8989/sonarr/login
ProxyPassReverse /sonarr/login http://sonarr:8989/sonarr/login
ProxyPass /sonarr/signalr ws://sonarr:8989/sonarr/signalr
ProxyPassReverse /sonarr/signalr ws://sonarr:8989/sonarr/signalr

# Authentication Location blocks (content handler phase)
<Location /sonarr>
    AuthType openid-connect
    Require valid-user
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /sonarr/api>
    AuthType openid-connect
    Require valid-user
</Location>

<Location /sonarr/login>
    AuthType openid-connect
    Require valid-user
</Location>

<Location /sonarr/signalr>
    AuthType openid-connect
    Require valid-user
</Location>
