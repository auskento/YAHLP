# Emby Reverse Proxy Configuration
ProxyPass /emby http://emby:8096/emby
ProxyPassReverse /emby http://emby:8096/emby
ProxyPass /emby/web http://emby:8096/emby/web
ProxyPassReverse /emby/web http://emby:8096/emby/web

<Location /emby>
    AuthType openid-connect
    Require valid-user
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
    RequestHeader set X-Remote-User %{REMOTE_USER}s
</Location>

<Location /emby/web>
    AuthType openid-connect
    Require valid-user
</Location>

