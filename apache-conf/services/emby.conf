# Emby Reverse Proxy Configuration
<Location /emby>
    ProxyPass http://emby:8096/emby
    ProxyPassReverse http://emby:8096/emby

    # Headers for proper operation
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
    RequestHeader set X-Remote-User %{REMOTE_USER}s
</Location>

<Location /emby/web>
    ProxyPass http://emby:8096/emby/web
    ProxyPassReverse http://emby:8096/emby/web
</Location>
