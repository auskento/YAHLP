# Tautulli Reverse Proxy Configuration
<Location /tautulli>
    ProxyPreserveHost On
    ProxyPass http://tautulli:8181/tautulli
    ProxyPassReverse http://tautulli:8181/tautulli

    # Headers for proper operation and iframe embedding
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
    RequestHeader set X-Script-Name "/tautulli"
    RequestHeader set X-Forwarded-Prefix "/tautulli"
</Location>

<Location /tautulli/api>
    ProxyPreserveHost On
    ProxyPass http://tautulli:8181/tautulli/api
    ProxyPassReverse http://tautulli:8181/tautulli/api
</Location>

<Location /tautulli/newsletter>
    ProxyPreserveHost On
    ProxyPass http://tautulli:8181/tautulli/newsletter
    ProxyPassReverse http://tautulli:8181/tautulli/newsletter
</Location>

<Location /tautulli/image>
    ProxyPreserveHost On
    ProxyPass http://tautulli:8181/tautulli/image
    ProxyPassReverse http://tautulli:8181/tautulli/image
</Location>
