# Transmission Reverse Proxy Configuration
<Location /transmission>
    AuthType openid-connect
    Require valid-user
    ProxyPass http://transmission:9091/transmission
    ProxyPassReverse http://transmission:9091/transmission
    
    # Transmission-specific settings
    
    # Headers for proper operation
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /transmission/api>
    AuthType openid-connect
    Require valid-user
    ProxyPass http://transmission:9091/transmission/api
    ProxyPassReverse http://transmission:9091/transmission/api
</Location>

<Location /transmission/rpc>
    AuthType openid-connect
    Require valid-user
    ProxyPass http://transmission:9091/transmission/rpc
    ProxyPassReverse http://transmission:9091/transmission/rpc
</Location>

