# Transmission Reverse Proxy Configuration
ProxyPass /transmission http://transmission:9091/transmission nocanon
ProxyPassReverse /transmission http://transmission:9091/transmission
ProxyPass /transmission/api http://transmission:9091/transmission/api nocanon
ProxyPassReverse /transmission/api http://transmission:9091/transmission/api
ProxyPass /transmission/rpc http://transmission:9091/transmission/rpc nocanon
ProxyPassReverse /transmission/rpc http://transmission:9091/transmission/rpc

<Location /transmission>
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>


