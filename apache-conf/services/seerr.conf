# Seerr Reverse Proxy Configuration
<Location /seerr>
    AuthType openid-connect
    Require valid-user
    ProxyPreserveHost On
    ProxyPass http://seerr:5055 retry=0 connectiontimeout=5 timeout=30 keepalive=on
    ProxyPassReverse http://seerr:5055
    RequestHeader set Connection ""

    # Header update, to support subfolder
    Header edit location ^/login https://@@DOMAIN@@/seerr/login
    Header edit location ^/setup https://@@DOMAIN@@/seerr/setup

    AddOutputFilterByType INFLATE;SUBSTITUTE text/html application/javascript application/json
    SubstituteMaxLineLength 2000K
    # This is HTML and JS update
    Substitute "s|href=\"|href=\"/seerr|inq"
    Substitute "s|src=\"|src=\"/seerr|inq"
    Substitute "s|/api/|/seerr/api/|inq"
    Substitute "s|\"/_next/|\"/seerr/_next/|inq"
    # This is JSON update
    Substitute "s|\"/avatarproxy/|\"/seerr/avatarproxy/|inq"
</Location>

# Handle Seerr login paths (OAuth callbacks)
<Location /login>
    AuthType openid-connect
    Require valid-user
    ProxyPass http://seerr:5055/login
    ProxyPassReverse http://seerr:5055/login
</Location>

<Location /setup>
    AuthType openid-connect
    Require valid-user
    ProxyPass http://seerr:5055/setup
    ProxyPassReverse http://seerr:5055/setup
</Location>

# Handle Seerr Next.js static assets
<LocationMatch ^/_next/>
    ProxyPass http://seerr:5055/_next/
    ProxyPassReverse http://seerr:5055/_next/
</LocationMatch>

