# Entra ID Authentication Protection Locations
# This file is conditionally included when AUTHTYPE=entra

# OAuth2 handler - no auth required
<Location /oauth2>
    SetHandler oauth2-handler
</Location>

# Unprotected paths - health check and static files
<Location /health>
    Require all granted
</Location>

<Location /icons>
    Require all granted
</Location>

<Location /sites>
    Require all granted
</Location>

<Location /styles>
    Require all granted
</Location>

<Location /error-pages>
    Require all granted
</Location>

# Root path - redirect to login via OIDC
<Location />
    AuthType openid-connect
    Require valid-user
</Location>

# API and service paths - require authentication (folder-based services only)
# Note: emby, plex, seerr are subdomains and handled by separate vhost files
# Includes /api/* for health checks and service queries
<LocationMatch "^/(api|sonarr|radarr|whisparr|jellyfin|lidarr|prowlarr|tautulli|maintainerr|transmission|qbittorrent|sabnzbd|deluge|nzbget|nzbhydra|jackett|bazarr)(/|$)">
    AuthType openid-connect
    Require valid-user
</LocationMatch>

# Pass Entra ID user info to backend services
RequestHeader set X-Remote-User %{OIDC_email}e
RequestHeader set X-Remote-Name %{OIDC_name}e
RequestHeader set X-Remote-ID %{OIDC_sub}e
RequestHeader set X-Auth-Method "Entra"
