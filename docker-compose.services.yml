# ═══════════════════════════════════════════════════════════════
# OPTIONAL: Complete Stack with Backend Services
# ═══════════════════════════════════════════════════════════════
# This file shows how to run the reverse proxy with backend
# services all in one docker-compose.
#
# To use this instead of the basic docker-compose.yml:
#   mv docker-compose.yml docker-compose.basic.yml
#   mv docker-compose.services.yml docker-compose.yml
#   docker-compose up -d
#
# Or run both files together:
#   docker-compose -f docker-compose.yml \
#                  -f docker-compose.services.yml up -d

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  # REVERSE PROXY (Required)
  # ═══════════════════════════════════════════════════════════════
  apache-reverse-proxy:
    build: .
    container_name: apache-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    
    environment:
      DOMAIN: example.com
      EMAIL: admin@example.com
      
      # Enable services you're running below
      ENABLE_SONARR: "true"
      ENABLE_RADARR: "true"
      ENABLE_JELLYFIN: "true"
      
      # Disable others
      ENABLE_WHISPARR: "false"
      ENABLE_LIDARR: "false"
      ENABLE_READARR: "false"
      ENABLE_PROWLARR: "false"
      ENABLE_OVERSEERR: "false"
      ENABLE_EMBY: "false"
      ENABLE_PLEX: "false"
      ENABLE_TAUTULLI: "false"
      ENABLE_TRANSMISSION: "false"
      ENABLE_QBITTORRENT: "false"
      ENABLE_SABNZBD: "false"
      ENABLE_DELUGE: "false"
      
      ENABLE_BASIC_AUTH: "false"
      BASIC_AUTH_CREDENTIALS: ""

      ENABLE_AUTH_OFFICE365: "false"
      SSL_PROTOCOLS: "all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1"
      SSL_CIPHERS: "HIGH:!aNULL:!MD5"
    
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - apache-logs:/var/log/apache2
    
    networks:
      - proxy-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ═══════════════════════════════════════════════════════════════
  # BACKEND SERVICES (Optional - Uncomment to use)
  # ═══════════════════════════════════════════════════════════════

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Australia/Melbourne
    volumes:
      - ./appdata/sonarr/config:/config
      - ./media:/media
    ports:
      - "8989:8989"
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/"]
      interval: 30s
      timeout: 10s
      retries: 3

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Australia/Melbourne
    volumes:
      - ./appdata/radarr/config:/config
      - ./media:/media
    ports:
      - "7878:7878"
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/"]
      interval: 30s
      timeout: 10s
      retries: 3

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Australia/Melbourne
    volumes:
      - ./appdata/jellyfin/config:/config
      - ./media:/media
    ports:
      - "8096:8096"
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/"]
      interval: 30s
      timeout: 10s
      retries: 3

