version: '3.8'

services:
  apache-reverse-proxy:
    build: .
    container_name: apache-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
      - "[::]:80:80"
      - "[::]:443:443"
      - "[::]:3000:3000"

    environment:
      # Proxy Configuration
      - PROXY_PORT=3000

      # Media Servers (for API Proxy)
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME}
      - JELLYFIN_PASSWORD=${JELLYFIN_PASSWORD}
      - PLEX_URL=http://plex:32400
      - PLEX_API_KEY=${PLEX_API_KEY}
      - EMBY_URL=http://emby:8096
      - EMBY_API_KEY=${EMBY_API_KEY}

      # Content Managers (for API Proxy)
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - LIDARR_URL=http://lidarr:8686
      - LIDARR_API_KEY=${LIDARR_API_KEY}
      - WHISPARR_URL=http://whisparr:6969
      - WHISPARR_API_KEY=${WHISPARR_API_KEY}

      # Download Clients (for API Proxy)
      - QBITTORRENT_URL=http://qbittorrent:8080
      - QBITTORRENT_API_KEY=${QBITTORRENT_API_KEY}
      - TRANSMISSION_URL=http://transmission:9091
      - TRANSMISSION_PASSWORD=${TRANSMISSION_PASSWORD}
      - SABNZBD_URL=http://sabnzbd:8080
      - SABNZBD_API_KEY=${SABNZBD_API_KEY}
      - NZBGET_URL=http://nzbget:6789
      - NZBGET_PASSWORD=${NZBGET_PASSWORD}
      - DELUGE_URL=http://deluge:8112
      - DELUGE_PASSWORD=${DELUGE_PASSWORD}

      # Utilities (for API Proxy)
      # Note: Proxy will append service name as BASE_URL (e.g., /nzbhydra, /tautulli)
      # If your service uses a different BASE_URL, append it to the URL below
      - NZBHYDRA_URL=http://nzbhydra:5076
      - NZBHYDRA_API_KEY=${NZBHYDRA_API_KEY}
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - JACKETT_URL=http://jackett:9117
      - JACKETT_API_KEY=${JACKETT_API_KEY}
      - SEERR_URL=http://seerr:5055
      - SEERR_API_KEY=${SEERR_API_KEY}
      - BAZARR_URL=http://bazarr:6767
      - BAZARR_API_KEY=${BAZARR_API_KEY}
      - TAUTULLI_URL=http://tautulli:8181
      - TAUTULLI_API_KEY=${TAUTULLI_API_KEY}
      - MAINTAINERR_URL=http://maintainerr:6246
      - MAINTAINERR_API_KEY=${MAINTAINERR_API_KEY}

      # Required: Domain and email for Let's Encrypt
      DOMAIN: example.com
      EMAIL: admin@example.com
      TZ: Australia/Melbourne
      
      # Service Enable/Disable (set to true/false)
      SONARR_ENABLED: "false"
      RADARR_ENABLED: "false"
      WHISPARR_ENABLED: "false"
      LIDARR_ENABLED: "false"
      PROWLARR_ENABLED: "false"
      JACKETT_ENABLED: "false"
      SEERR_ENABLED: "false"
      BAZARR_ENABLED: "false"
      NZBGET_ENABLED: "false"
      NZBHYDRA_ENABLED: "false"
      MAINTAINERR_ENABLED: "false"
      JELLYFIN_ENABLED: "false"
      EMBY_ENABLED: "false"
      PLEX_ENABLED: "false"
      TAUTULLI_ENABLED: "false"
      TRANSMISSION_ENABLED: "false"
      QBITTORRENT_ENABLED: "false"
      SABNZBD_ENABLED: "false"
      DELUGE_ENABLED: "false"
      
      # Service Backend URLs (specify where each service is located)
      SONARR_URL: "http://sonarr:8989"
      RADARR_URL: "http://radarr:7878"
      WHISPARR_URL: "http://whisparr:6969"
      LIDARR_URL: "http://lidarr:8686"
      PROWLARR_URL: "http://prowlarr:9696"
      JACKETT_URL: "http://jackett:9117"
      SEERR_URL: "http://overseerr:5055"
      JELLYFIN_URL: "http://jellyfin:8096"
      EMBY_URL: "http://emby:8096"
      PLEX_URL: "http://plex:32400"
      TAUTULLI_URL: "http://tautulli:8181"
      TRANSMISSION_URL: "http://transmission:9091"
      QBITTORRENT_URL: "http://qbittorrent:8080"
      SABNZBD_URL: "http://sabnzbd:8080"
      DELUGE_URL: "http://deluge:8112"
      
      # Custom Backend (optional - for generic service)
      ENABLE_CUSTOM_BACKEND: "false"
      CUSTOM_BACKEND_PATH: /custom
      CUSTOM_BACKEND_URL: "http://your-service:8080"
      
      # Optional: Custom Icons (auto-downloaded and resized)
      # Leave empty to use colored placeholders
      SABNZBD_ICON_URL: ""
      NZBGET_ICON_URL: ""
      NZBHYDRA_ICON_URL: ""
      TRANSMISSION_ICON_URL: ""
      QBITTORRENT_ICON_URL: ""
      DELUGE_ICON_URL: ""
      SONARR_ICON_URL: ""
      RADARR_ICON_URL: ""
      LIDARR_ICON_URL: ""
      WHISPARR_ICON_URL: ""
      PROWLARR_ICON_URL: ""
      JACKETT_ICON_URL: ""
      SEERR_ICON_URL: ""
      BAZARR_ICON_URL: ""
      JELLYFIN_ICON_URL: ""
      EMBY_ICON_URL: ""
      PLEX_ICON_URL: ""
      TAUTULLI_ICON_URL: ""
      MAINTAINERR_ICON_URL: ""
      
      # Authentication Method (none, basic, oauth)
      AUTHTYPE: "none"

      # Basic Authentication (if AUTHTYPE=basic)
      BASIC_AUTH_CREDENTIALS: ""

      # Office 365 / Azure AD (if AUTHTYPE=oauth)
      OAUTH2_CLIENT_ID: ""
      OAUTH2_CLIENT_SECRET: ""
      OAUTH2_REDIRECT_URI: "https://yourdomain.com/oauth2callback"
      OAUTH2_ALLOWED_DOMAINS: "example.com"
      OAUTH2_CRYPTO_PASSPHRASE: ""
      
      # SSL Security Settings
      SSL_PROTOCOLS: "all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1"
      SSL_CIPHERS: "HIGH:!aNULL:!MD5"
    
    volumes:
      # Persist SSL certificates between restarts
      - letsencrypt-data:/etc/letsencrypt
      # Persist Apache logs
      - apache-logs:/var/log/apache2
      # Mount custom template CSS files (user can add layout-*.css files here)
      - ./templates:/templates
    
    networks:
      - proxy-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  letsencrypt-data:
    driver: local
  apache-logs:
    driver: local

networks:
  proxy-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "true"
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: 2001:db8::/32
