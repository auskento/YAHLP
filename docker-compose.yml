version: '3.8'

services:
  apache-reverse-proxy:
    build: .
    container_name: apache-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    
    environment:
      # Required: Domain and email for Let's Encrypt
      DOMAIN: example.com
      EMAIL: admin@example.com
      TZ: Australia/Melbourne
      
      # Service Enable/Disable (set to true/false)
      ENABLE_SONARR: "false"
      ENABLE_RADARR: "false"
      ENABLE_WHISPARR: "false"
      ENABLE_LIDARR: "false"
      ENABLE_READARR: "false"
      ENABLE_PROWLARR: "false"
      ENABLE_OVERSEERR: "false"
      ENABLE_JELLYFIN: "false"
      ENABLE_EMBY: "false"
      ENABLE_PLEX: "false"
      ENABLE_TAUTULLI: "false"
      ENABLE_TRANSMISSION: "false"
      ENABLE_QBITTORRENT: "false"
      ENABLE_SABNZBD: "false"
      ENABLE_DELUGE: "false"
      
      # Service Backend URLs (specify where each service is located)
      SONARR_URL: "http://sonarr:8989"
      RADARR_URL: "http://radarr:7878"
      WHISPARR_URL: "http://whisparr:6969"
      LIDARR_URL: "http://lidarr:8686"
      READARR_URL: "http://readarr:8787"
      PROWLARR_URL: "http://prowlarr:9696"
      OVERSEERR_URL: "http://overseerr:5055"
      JELLYFIN_URL: "http://jellyfin:8096"
      EMBY_URL: "http://emby:8096"
      PLEX_URL: "http://plex:32400"
      TAUTULLI_URL: "http://tautulli:8181"
      TRANSMISSION_URL: "http://transmission:6969"
      QBITTORRENT_URL: "http://qbittorrent:8080"
      SABNZBD_URL: "http://sabnzbd:8080"
      DELUGE_URL: "http://deluge:8112"
      
      # Custom Backend (optional - for generic service)
      ENABLE_CUSTOM_BACKEND: "false"
      CUSTOM_BACKEND_PATH: /custom
      CUSTOM_BACKEND_URL: "http://your-service:8080"
      
      # Optional: Custom Icons (auto-downloaded and resized)
      # Leave empty to use colored placeholders
      ICON_URL_SONARR: ""
      ICON_URL_RADARR: ""
      ICON_URL_WHISPARR: ""
      ICON_URL_LIDARR: ""
      ICON_URL_READARR: ""
      ICON_URL_PROWLARR: ""
      ICON_URL_OVERSEERR: ""
      ICON_URL_JELLYFIN: ""
      ICON_URL_EMBY: ""
      ICON_URL_PLEX: ""
      ICON_URL_TAUTULLI: ""
      ICON_URL_TRANSMISSION: ""
      ICON_URL_QBITTORRENT: ""
      ICON_URL_SABNZBD: ""
      ICON_URL_DELUGE: ""
      
      # Optional: Basic Authentication
      ENABLE_BASIC_AUTH: "false"
      BASIC_AUTH_CREDENTIALS: ""

      # Optional: Office 365 / Azure AD Authentication
      ENABLE_AUTH_OFFICE365: "false"
      OAUTH2_CLIENT_ID: ""
      OAUTH2_CLIENT_SECRET: ""
      OAUTH2_REDIRECT_URI: "https://yourdomain.com/oauth2callback"
      OAUTH2_ALLOWED_DOMAINS: "example.com"
      OAUTH2_CRYPTO_PASSPHRASE: ""
      
      # SSL Security Settings
      SSL_PROTOCOLS: "all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1"
      SSL_CIPHERS: "HIGH:!aNULL:!MD5"
    
    volumes:
      # Persist SSL certificates between restarts
      - letsencrypt-data:/etc/letsencrypt
      # Persist Apache logs
      - apache-logs:/var/log/apache2
    
    networks:
      - proxy-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  letsencrypt-data:
    driver: local
  apache-logs:
    driver: local

networks:
  proxy-network:
    driver: bridge
